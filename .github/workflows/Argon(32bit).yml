name: Make Argon Theme run files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-run:
    runs-on: ubuntu-latest

    steps:
      - name: рҹ“Ҙ Checkout
        uses: actions/checkout@v4

      - name: рҹ“Ұ Install tools
        run: sudo apt-get update && sudo apt-get install -y makeself curl jq

      - name: рҹ”Қ Get Latest Info
        id: get_info
        run: |
          API_URL="https://api.github.com/repos/jerrykuku/luci-theme-argon/releases/latest"
          RESPONSE=$(curl -s "$API_URL")
          LATEST_TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          VERSION=$(echo "$LATEST_TAG" | sed 's/[^0-9\.-]//g')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets[] | select(.name | contains("luci-theme-argon") and endswith(".ipk")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "вқҢ Error: Cannot find IPK"
            exit 1
          fi

          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: рҹҡҖ Download IPK
        run: |
          mkdir -p build_dir
          curl -L "${{ env.DOWNLOAD_URL }}" -o build_dir/luci-theme-argon_all.ipk

      - name: рҹ“Ӣ Create Installer Script
        run: |
          # дҝ®жӯЈйҮҚй»һпјҡзўәдҝқйҖҷиЈЎзҡ„зё®йҖІиҲҮ run: е°ҚйҪҠпјҢдё”е…§е®№иў«жӯЈзўәеҜ«е…Ҙ
          cat << 'EOF' > build_dir/install.sh
#!/bin/sh
BASE_DIR=$(cd "$(dirname "$0")"; pwd)
echo "Installing Argon Theme..."
if command -v opkg > /dev/null; then
    opkg install "$BASE_DIR"/*.ipk
elif command -v apk > /dev/null; then
    apk add --allow-untrusted "$BASE_DIR"/*.ipk
fi
rm -rf /tmp/luci-indexcache /tmp/luci-modulecache/
echo "Done!"
EOF
          chmod +x build_dir/install.sh

      - name: рҹӣ пёҸ Run Makeself
        run: |
          mkdir -p output
          # дҪҝз”Ё steps и®Ҡж•ёжҷӮзўәдҝқж јејҸжӯЈзўә
          makeself build_dir "output/luci-theme-argon-${{ steps.get_info.outputs.VERSION }}_arm_cortex-a9.run" "Argon Installer" ./install.sh

      - name: рҹ“Ө Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.get_info.outputs.VERSION }}-${{ github.run_number }}"
          name: "Argon Theme v${{ steps.get_info.outputs.VERSION }}"
          body: "Build from upstream: ${{ env.LATEST_TAG }}"
          files: output/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
