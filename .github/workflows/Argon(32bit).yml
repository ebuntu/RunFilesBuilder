# License: MIT
# Author: wukongdaily (Modified for 32-bit ARM)
#=================================================
name: Make Argon Theme run files (Full Auto-Fetch)

on:
  workflow_dispatch:

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v3

      - name: 📦 安裝工具 (makeself, curl, jq)
        run: sudo apt-get update && sudo apt-get install -y makeself curl jq

      - name: 🔍 獲取 GitHub 最新版本資訊
        id: get_version
        run: |
          # 1. 調用 GitHub API 獲取最新發佈資訊
          API_URL="https://api.github.com/repos/jerrykuku/luci-theme-argon/releases/latest"
          RESPONSE=$(curl -s $API_URL)
          
          # 2. 提取 Tag 名稱 (例如 v2.3.1)
          LATEST_TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          
          # 3. 提取版本號數字部分 (例如 2.3.1)
          # 使用 sed 過濾掉所有非數字、點、橫線的字元，確保版本號純淨
          VERSION=$(echo "$LATEST_TAG" | sed 's/[^0-9\.-]//g')
          
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "最新 Tag: $LATEST_TAG, 提取版本號: $VERSION"

      - name: 🚀 動態下載最新 IPK
        run: |
          mkdir -p arm_cortex-a9_vfpv3-d16
          
          # 構造下載網址 (注意：Argon 的命名規則通常是 luci-theme-argon_${VERSION}_all.ipk)
          IPK_NAME="luci-theme-argon_${{ steps.get_version.outputs.VERSION }}_all.ipk"
          DOWNLOAD_URL="https://github.com/jerrykuku/luci-theme-argon/releases/download/${{ env.LATEST_TAG }}/${IPK_NAME}"
          
          echo "正在嘗試從此網址下載: $DOWNLOAD_URL"
          
          # 執行下載並重新命名為固定的檔名方便 install.sh 調用
          curl -L "$DOWNLOAD_URL" -o arm_cortex-a9_vfpv3-d16/luci-theme-argon_all.ipk
          
          # 驗證下載結果
          if [ ! -s arm_cortex-a9_vfpv3-d16/luci-theme-argon_all.ipk ]; then
            echo "❌ 錯誤：找不到該版本的 .ipk 檔案，請檢查 upstream 命名規則是否變更。"
            exit 1
          fi

      - name: 📋 注入安裝腳本
        run: |
          # 確保你的 shell/install.sh 存在
          if [ -f "shell/install.sh" ]; then
            cp shell/install.sh arm_cortex-a9_vfpv3-d16/install.sh
            chmod +x arm_cortex-a9_vfpv3-d16/install.sh
          else
            echo "❌ 找不到 shell/install.sh，請檢查倉庫路徑"
            exit 1
          fi

      - name: 🛠️ 執行 Makeself 打包
        run: |
          mkdir -p output
          # 打包輸出檔案名稱包含動態版本號
          makeself arm_cortex-a9_vfpv3-d16 "output/luci-theme-argon-${{ steps.get_version.outputs.VERSION }}_arm_cortex-a9.run" \
            "Argon Theme Installer v${{ steps.get_version.outputs.VERSION }}" ./install.sh

      - name: 📤 發佈到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "argon-${{ steps.get_version.outputs.VERSION }}-${{ github.run_number }}"
          name: "Argon Theme ${{ steps.get_version.outputs.VERSION }} 自動打包"
          body: |
            ### 自動構建資訊
            - **來源版本**: ${{ env.LATEST_TAG }}
            - **構建架構**: arm_cortex-a9 (32-bit)
            - **構建時間**: ${{ github.event.head_commit.timestamp }}
          files: output/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
