name: Make Argon Theme run files (APK/IPK Support)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-run:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install tools
        run: sudo apt-get update && sudo apt-get install -y makeself curl jq

      - name: 🔍 Get Latest Info (Support APK/IPK)
        id: get_info
        run: |
          API_URL="https://api.github.com/repos/jerrykuku/luci-theme-argon/releases/latest"
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$API_URL")
          
          if echo "$RESPONSE" | jq -e .message > /dev/null; then
            echo "❌ GitHub API 報錯: $(echo "$RESPONSE" | jq -r .message)"
            exit 1
          fi

          LATEST_TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          VERSION=$(echo "$LATEST_TAG" | sed 's/[^0-9\.-]//g')
          
          # 修正篩選邏輯：匹配包含 luci-theme-argon 且結尾是 .ipk 或 .apk 的檔案
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets[] | select(.name | test("luci-theme-argon.*\\.(ipk|apk)$")) | .browser_download_url' | head -n 1)
          
          # 獲取實際檔名以判斷後綴
          FILE_NAME=$(echo "$DOWNLOAD_URL" | sed 's/.*\///')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "❌ 錯誤：找不到任何 .ipk 或 .apk 檔案"
            echo "目前 Assets 列表："
            echo "$RESPONSE" | jq -r '.assets[].name'
            exit 1
          fi

          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 發現新格式檔案: $FILE_NAME"

      - name: 🚀 Download File
        run: |
          mkdir -p build_dir
          # 保持原始檔名下載，以便 install.sh 判斷
          curl -L "${{ env.DOWNLOAD_URL }}" -o "build_dir/${{ env.FILE_NAME }}"

      - name: 📋 Create Smart Installer Script
        run: |
          printf '#!/bin/sh\n' > build_dir/install.sh
          printf 'BASE_DIR=$(cd "$(dirname "$0")"; pwd)\n' >> build_dir/install.sh
          printf 'echo "-----------------------------------"\n' >> build_dir/install.sh
          printf 'echo "  Installing Argon Theme (v%s)"\n' "${{ steps.get_info.outputs.VERSION }}" >> build_dir/install.sh
          printf 'echo "-----------------------------------"\n' >> build_dir/install.sh
          
          # 智慧判斷安裝指令
          printf 'if ls "$BASE_DIR"/*.apk >/dev/null 2>&1; then\n' >> build_dir/install.sh
          printf '    echo "檢測到 APK 格式，正在使用 apk add..."\n' >> build_dir/install.sh
          printf '    apk add --allow-untrusted "$BASE_DIR"/*.apk\n' >> build_dir/install.sh
          printf 'elif ls "$BASE_DIR"/*.ipk >/dev/null 2>&1; then\n' >> build_dir/install.sh
          printf '    echo "檢測到 IPK 格式，正在使用 opkg install..."\n' >> build_dir/install.sh
          printf '    opkg install "$BASE_DIR"/*.ipk\n' >> build_dir/install.sh
          printf 'else\n' >> build_dir/install.sh
          printf '    echo "❌ 找不到可安裝的軟體包"\n' >> build_dir/install.sh
          printf '    exit 1\n' >> build_dir/install.sh
          printf 'fi\n' >> build_dir/install.sh
          
          printf 'rm -rf /tmp/luci-indexcache /tmp/luci-modulecache/\n' >> build_dir/install.sh
          printf 'echo "✅ 安裝完成！"\n' >> build_dir/install.sh
          chmod +x build_dir/install.sh

      - name: 🛠️ Run Makeself
        run: |
          mkdir -p output
          makeself build_dir "output/luci-theme-argon-${{ steps.get_info.outputs.VERSION }}_arm_cortex-a9.run" "Argon Installer" ./install.sh

      - name: 📤 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "argon-${{ steps.get_info.outputs.VERSION }}-${{ github.run_number }}"
          name: "Argon Theme v${{ steps.get_info.outputs.VERSION }} (New APK Support)"
          body: |
            ### 自動化建置報告
            - **上游檔案**: ${{ env.FILE_NAME }}
            - **架構**: arm_cortex-a9 / Generic
            - **支援**: OpenWrt 24.10+ (APK) 及舊版 (IPK)
          files: output/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
