name: Make Argon Theme run files (Debug Version)

on:
  workflow_dispatch:

# 核心修正 1：確保有權限建立 Release
permissions:
  contents: write

jobs:
  make-run:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 檢出程式碼
        uses: actions/checkout@v4

      - name: 📦 安裝工具
        run: sudo apt-get update && sudo apt-get install -y makeself curl jq

      - name: 🔍 獲取版本並精確搜索下載連結
        id: get_info
        run: |
          # 1. 獲取最新 Release JSON
          API_URL="https://api.github.com/repos/jerrykuku/luci-theme-argon/releases/latest"
          RESPONSE=$(curl -s $API_URL)
          
          # 2. 提取 Tag 和版本數字
          LATEST_TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          VERSION=$(echo "$LATEST_TAG" | sed 's/[^0-9\.-]//g')
          
          # 3. 遍歷所有 Assets，找到包含 'luci-theme-argon' 且結尾是 '.ipk' 的連結
          # 這一步最容易出錯，我們加入診斷信息
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets[] | select(.name | contains("luci-theme-argon") and endswith(".ipk")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "❌ 錯誤：找不到 .ipk 下載連結。請檢查 jerrykuku 的 Release 頁面。"
            echo "API 回應內容如下："
            echo "$RESPONSE" | jq .assets
            exit 1
          fi

          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 準備下載版本: $LATEST_TAG"

      - name: 🚀 下載並準備目錄
        run: |
          mkdir -p build_dir
          curl -L "${{ env.DOWNLOAD_URL }}" -o build_dir/luci-theme-argon_all.ipk
          
          # 驗證下載檔案是否為空的
          if [ ! -s build_dir/luci-theme-argon_all.ipk ]; then
             echo "❌ 錯誤：下載的檔案大小為 0"
             exit 1
          fi

      - name: 📋 生成穩定版安裝腳本
        run: |
          # 這裡我們不依賴外部 shell/install.sh，直接現場生成，避免目錄錯誤
          cat << 'EOF' > build_dir/install.sh
#!/bin/sh
BASE_DIR=$(cd "$(dirname "$0")"; pwd)
echo "-----------------------------------"
echo "  Argon Theme Installer"
echo "-----------------------------------"
if command -v opkg > /dev/null; then
    opkg install "$BASE_DIR"/*.ipk
elif command -v apk > /dev/null; then
    apk add --allow-untrusted "$BASE_DIR"/*.ipk
else
    echo "❌ Error: No package manager found."
    exit 1
fi
rm -rf /tmp/luci-indexcache /tmp/luci-modulecache/
echo "✅ Done!"
EOF
          chmod +x build_dir/install.sh

      - name: 🛠️ 執行 Makeself 打包
        run: |
          mkdir -p output
          # 我們將打包目標設為 build_dir
          makeself build_dir "output/luci-theme-argon-${{ steps.get_info.outputs.VERSION }}_arm_cortex-a9.run" \
            "Argon Theme Installer" ./install.sh

      - name: 📤 發佈到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "argon-${{ steps.get_info.outputs.VERSION }}-${{ github.run_number }}"
          name: "Argon Theme ${{ steps.get_info.outputs.VERSION }}"
          files: output/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
