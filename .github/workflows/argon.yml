name: Make Argon Theme run files

on:
  workflow_dispatch:

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📦 安装 makeself 工具
        run: sudo apt-get update && sudo apt-get install -y makeself curl

      - name: 🚀 下载argon所有ipk
        run: |
          chmod +x shell/argon.sh
          ./shell/argon.sh

# 在 make-run job 的步驟中，把原本的兩個平台擴充為三個
- name: 📋 複製 install.sh 到各平台目錄
  run: |
    for plat in x86_64 aarch64_generic arm_cortex-a9_vfpv3; do
      cp shell/install.sh $plat/install.sh
      chmod +x $plat/install.sh
    done

- name: 🔍 提取版本號並打包
  run: |
    mkdir -p output
    # 以一個平台的 IPK 取出版本號（內容一致）
    ARGON_IPK=$(ls arm_cortex-a9_vfpv3/luci-theme-argon_*.ipk | head -n1)
    VERSION=$(basename "$ARGON_IPK" | sed -n 's/^luci-theme-argon_\([^-]*-[^_]*\)_.*$/\1/p')
    echo "version=$VERSION" >> $GITHUB_OUTPUT

    for plat in x86_64 aarch64_generic arm_cortex-a9_vfpv3; do
      makeself "$plat" "output/luci-theme-argon-${VERSION}_${plat}.run" \
        "argon ${plat} Installer v${VERSION}" ./install.sh
    done

      - name: 📤 上传 .run 文件到 release
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: "argon-${{ steps.pack.outputs.version }}"
          name: "argon-${{ steps.pack.outputs.version }}"
          body_path: ${{ github.workspace }}/common.md
          files: output/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
